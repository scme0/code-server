# OPTIONAL / opt-in. NOT in kustomization.yaml by default.
#
# kind's default CNI (kindnet) does NOT enforce NetworkPolicy, so this is a
# no-op there. It only takes effect if you run kind with a policy-enforcing CNI
# (Calico/Cilium — see README). Even then, vanilla NetworkPolicy can't do
# FQDN/L7 allowlists, so true "GitHub + Anthropic only" egress needs Cilium
# CiliumNetworkPolicy. The real GitHub control here is the git-proxy sidecar
# (no token in Claude's container); this policy is defence-in-depth/intent.
#
# This baseline policy: default-deny ingress; egress limited to DNS, HTTPS/HTTP,
# and the apiserver (for k8s-run). Apply with: kubectl apply -f networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-egress
  namespace: code-server-work
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: code-server
  policyTypes: [Ingress, Egress]
  ingress:
    # allow host port-forward + intra-namespace (e.g. k8s-run pods)
    - {}
  egress:
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 6443 }   # kube-apiserver (k8s-run)
