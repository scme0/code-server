# Workspace = source code only, ephemeral in spirit (reset --hard origin every
# boot by the reset-repos initContainer). On a PVC because k8s-run build pods
# share it; "standard" is kind's built-in local-path storage class.
# Named code-server-workspace to match k8s-run's default PVC (portable with home).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-workspace
  namespace: code-server-work
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
