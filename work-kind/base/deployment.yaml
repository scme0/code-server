# Common deployment skeleton. The workspace volume and the boot-time init
# container differ per mode and are added by the overlays:
#   overlays/mount  → workspace = host repos bind-mount (RW), light init
#   overlays/clone  → workspace = ephemeral PVC, reset-on-boot clone init
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server-work
  labels:
    app.kubernetes.io/name: code-server
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVCs — don't run two pods at once
  selector:
    matchLabels:
      app.kubernetes.io/name: code-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-server
    spec:
      serviceAccountName: code-server
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        # /data is a host bind-mount (sandbox-state) — only fix the top dir's group
        # if wrong, never recursively chown your persisted state on every mount.
        fsGroupChangePolicy: OnRootMismatch

      initContainers:
        # --- native sidecar: git proxy (starts and stays up for the pod) -------
        # Holds the GitHub token (GH_AUTH_B64) and injects it; Claude's containers
        # only ever talk to localhost:8088 and never see the token.
        # The overlays append their own boot init container after this one.
        - name: git-proxy
          image: caddy:2.10-alpine
          restartPolicy: Always          # => native sidecar (k8s 1.29+; GA 1.33)
          env:
            - name: GH_AUTH_B64
              valueFrom:
                secretKeyRef:
                  name: git-proxy-auth
                  key: gh-auth-b64
            # caddy runs as uid 1000 (pod securityContext) — give it writable
            # data/config dirs so it doesn't fail trying to write to /.
            - { name: XDG_DATA_HOME, value: /tmp }
            - { name: XDG_CONFIG_HOME, value: /tmp }
          command: [caddy, run, --config, /etc/caddy/Caddyfile, --adapter, caddyfile]
          ports:
            - containerPort: 8088
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # caddy's binary carries the cap_net_bind_service FILE capability;
              # with drop:ALL it's outside the bounding set and execve fails EPERM
              # ("operation not permitted"). Caddy only binds :8088 so it isn't
              # used — but the file cap must be within the bounding set to exec.
              add: ["NET_BIND_SERVICE"]

      containers:
        - name: code-server
          image: scottyjoe9/code-server:3412923
          command:
            - code-server
            - --bind-addr
            - 0.0.0.0:8080
            - --auth
            - none
            - --user-data-dir
            - /data/code-server
            # multi-root workspace (written by common-init.sh): code + notes
            - /data/.sandbox.code-workspace
          ports:
            - { containerPort: 8080 }
          env: &claudeenv
            - { name: HOME, value: /data/home }
            # CLAUDE_CONFIG_DIR intentionally unset → Claude uses ~/.claude
            # (=/data/home/.claude). Your dotfiles' aliases can point at
            # ~/.claude-home / ~/.claude-work; all live under the persisted /data.
            - { name: GIT_CONFIG_GLOBAL, value: /etc/git/gitconfig }
            # Container-wide so EVERY chezmoi apply (boot or manual) gates the
            # sandbox-specific bits (git-ai off, .kube/.talos ignored, etc.).
            - { name: CODE_SERVER_SANDBOX, value: "1" }
            # k8s-run defaults (PVC is code-server-workspace by default — matches)
            - { name: KRUN_NS, value: code-server-work }
            - { name: GITSTATUS_CACHE_DIR, value: /tmp/gitstatus }
            - { name: LANG, value: C.UTF-8 }
            - { name: LC_ALL, value: C.UTF-8 }
            # Optional: ANTHROPIC_API_KEY from a secret if present, else
            # `claude /login` interactively (persists on the config PVC).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: api-key
                  optional: true
          resources:
            # No CPU limit on purpose: a CPU limit means CFS throttling, which on a
            # 1-core cap caused ~2s keystroke lag while language servers indexed big
            # repos. Requests still schedule it; it bursts to spare node cores.
            requests: { memory: 512Mi, cpu: 500m }
            limits:   { memory: 8Gi }
          volumeMounts: &claudemounts
            - { name: config,    mountPath: /data }
            # HostToContainer: when REPOS mounts each repo as a sub-mount under
            # /mnt/repos, they propagate into the pod's /data/workspace. Harmless
            # for clone mode (PVC, no sub-mounts). baseline-PSA safe.
            - { name: workspace, mountPath: /data/workspace, mountPropagation: HostToContainer }
            - { name: git-config, mountPath: /etc/git }
            - { name: notes,     mountPath: /mnt/notes }

        - name: ttyd
          image: scottyjoe9/code-server:3412923
          command: [/usr/local/bin/start-ttyd.sh]
          ports:
            - { containerPort: 7681 }
          env: *claudeenv
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 4Gi }            # no CPU limit (avoid CFS throttling)
          volumeMounts: *claudemounts

      # The `workspace` volume is added by the overlay (mount vs clone).
      volumes:
        - { name: config,           persistentVolumeClaim: { claimName: sandbox-state } }
        - { name: git-config,       configMap: { name: git-config, items: [{ key: gitconfig, path: gitconfig }] } }
        - { name: claude-config-src, configMap: { name: claude-config } }
        - { name: work-repos,       configMap: { name: work-repos } }
        - { name: caddy-config,     configMap: { name: git-proxy-caddy } }
        - { name: shell-config,     configMap: { name: shell-config } }
        # notes via PVC (not a hostPath volume) so the pod is baseline-PSA
        # compliant; the hostPath lives on the PV (see base/pvcs.yaml).
        - { name: notes,        persistentVolumeClaim: { claimName: notes } }
        - { name: dotfiles-src, persistentVolumeClaim: { claimName: dotfiles-src } }
