apiVersion: v1
kind: Namespace
metadata:
  name: code-server-work
  labels:
    # baseline (not restricted): k8s-run build pods + tooling may run as root and
    # need basic capabilities, but privileged / hostPath / hostNetwork are blocked.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: baseline
