# System tmux config for the code-server sandbox image (→ /etc/tmux.conf).
# Applies to every user with no dotfiles needed.

# Pass kitty extended key sequences (e.g. Shift+Enter) through to apps like Claude Code.
set -g extended-keys on

# OSC 52 clipboard for KEYBOARD copy-mode (prefix-[ … y): tmux copies to a buffer,
# emits OSC 52, mobile-controller.js writes it to the browser clipboard.
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

# Mouse OFF — deliberately. The terminal layer (xterm.js + the browser) owns the
# mouse, which is the smooth native path:
#   - select  → xterm native selection, auto-copied (ttyd copyOnSelect=true)
#   - wheel   → scrolls the real terminal scrollback (see alt-screen below)
#   - right-click → the browser's own context menu
# tmux mouse-on instead hands all of that to tmux (copy-mode selection, its own
# right-click menu, wheel forwarded to the app) — a different, clunkier path.
set -g mouse off

# Disable the alternate screen. Full-screen apps (Claude, shells) then render
# INLINE into the main buffer, so their output accumulates in the terminal
# scrollback and the mouse wheel scrolls it natively — for both the shell AND
# Claude. (Trade-off: vim/less/etc. also render inline, leaving scrollback
# artifacts on redraw/exit — acceptable for this sandbox.)
set -ga terminal-overrides ',*:smcup@:rmcup@'
