# OPTIONAL / opt-in. NOT in kustomization.yaml by default.
#
# k3s's default flannel CNI ships the kube-router NetworkPolicy controller, so —
# unlike kind's kindnet, which ignored NetworkPolicy — this IS enforced once
# applied. Even so, vanilla NetworkPolicy can't do FQDN/L7 allowlists, so true
# "GitHub + Anthropic only" egress still relies on the boundary gateway, not this.
# The real GitHub control here is the git-proxy sidecar (no token in Claude's
# container); this policy is defence-in-depth/intent layered on the gateway.
#
# This baseline policy: default-deny ingress; egress limited to DNS, HTTPS/HTTP,
# and the apiserver (for k8s-run). Apply with: kubectl apply -f networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-egress
  namespace: code-server-work
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: code-server
  policyTypes: [Ingress, Egress]
  ingress:
    # allow host port-forward + intra-namespace (e.g. k8s-run pods)
    - {}
  egress:
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 6443 }   # kube-apiserver (k8s-run)
