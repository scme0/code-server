# ServiceAccount + least-privilege role so k8s-run can spawn disposable build
# pods in THIS namespace only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-server
  namespace: code-server-work
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: code-server-krun
  namespace: code-server-work
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: code-server-krun
  namespace: code-server-work
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: code-server-krun
subjects:
  - kind: ServiceAccount
    name: code-server
    namespace: code-server-work
