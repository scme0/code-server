# Egress forward proxy for the sandbox. Agents/build pods set HTTPS_PROXY to
# http://<gw>:8888. Allowlist is enforced via the generated Filter file
# (FilterDefaultDeny = only matching hosts are allowed). Logs to stdout →
# `docker logs <gateway>` is the egress audit trail.
Port 8888
Timeout 600
LogLevel Info
MaxClients 100

# Only the sandbox may use the proxy: the per-instance internal subnets
# (172.30.x.0/24) and the in-cluster pod/service CIDRs (SNATed or direct).
Allow 172.30.0.0/16
Allow 10.0.0.0/8

# Allowlist mode: deny by default, permit only hosts matching the filter.
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
Filter "/etc/gateway/tinyproxy.filter"

# CONNECT (HTTPS) only to web ports — no tunnelling SSH/etc. out.
ConnectPort 443
ConnectPort 80
