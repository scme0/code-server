# Static dnsmasq base. entrypoint.sh appends a `listen-address` line, one
# `server=/<domain>/<upstream>` per allowlisted domain, and a final
# `address=/#/0.0.0.0` catch-all (sinkhole) — so only allowlisted names resolve
# and DNS tunnelling to an arbitrary authoritative server is dead.
# CoreDNS in the cluster forwards external names here.
no-resolv
no-hosts
bind-interfaces
cache-size=1000
log-queries
